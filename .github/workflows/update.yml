name: Stock-Quantum-Auto
on:
  schedule:
    - cron: '*/15 1-9 * * 1-5' # 港股交易時段每 15 分鐘運行一次
  workflow_dispatch: # 允許手動觸發測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4 # 升級到 v4
        
      - name: 設置 Python 環境
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.11'
          
      - name: 安裝必要算力庫
        run: |
          pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4 lxml
          
      - name: 執行分析引擎
        run: python main.py
        
      - name: 推送數據回倉庫
        run: |
          git config --global user.name "AI-Stock-Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "算力自動更新: $(date)" || exit 0
          git push
