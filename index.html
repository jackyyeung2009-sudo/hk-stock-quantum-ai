<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>港股智勝 AI 指揮部 V8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #010409; color: #e6edf3; font-family: 'JetBrains Mono', sans-serif; }
        .lego-brick { width: 14px; height: 24px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.05); }
        .bg-red { background: #f85149; box-shadow: 0 0 10px rgba(248, 81, 73, 0.4); }
        .bg-blue { background: #388bfd; box-shadow: 0 0 10px rgba(56, 139, 253, 0.4); }
        .bg-gray { background: #21262d; }
        .sector-tag { background: linear-gradient(90deg, #388bfd 0%, transparent 100%); padding: 4px 12px; border-left: 4px solid #388bfd; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-end border-b border-slate-800 pb-8">
        <div>
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter">QUANTUM ALPHA V8.0</h1>
            <p class="text-slate-500 text-[10px] mt-2 font-bold uppercase tracking-widest">張士佳 LEGO 視覺化 + 板塊分區 + 形態推斷</p>
        </div>
        <div class="text-right">
            <p id="clock-aest" class="text-emerald-400 font-bold text-xl"></p>
            <p id="clock-hkt" class="text-slate-600 text-[10px] font-bold"></p>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto space-y-12">
        <div class="text-center py-20 text-slate-700 animate-pulse font-black text-xl">正在調用最高算力引擎...</div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            const fmt = (tz) => new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(now);
            document.getElementById('clock-aest').innerText = `AEST: ${fmt('Australia/Brisbane')}`;
            document.getElementById('clock-hkt').innerText = `HKT: ${fmt('Asia/Hong_Kong')}`;
        }

        async function render() {
            try {
                const res = await fetch('./data.json?t=' + Date.now());
                const root = await res.json();
                const container = document.getElementById('main-content');
                container.innerHTML = '';

                // 按板塊分組數據
                const grouped = root.data.reduce((acc, obj) => {
                    (acc[obj.sector] = acc[obj.sector] || []).push(obj);
                    return acc;
                }, {});

                for (const [sector, stocks] of Object.entries(grouped)) {
                    let sectorHtml = `<section><div class="sector-tag mb-6 text-slate-200 uppercase tracking-widest">${sector} 板塊實時流向</div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">`;
                    
                    stocks.forEach(s => {
                        const bricks = s.lego.map(color => `<div class="lego-brick bg-${color}"></div>`).join('');
                        sectorHtml += `
                            <div class="bg-[#0d1117] border border-slate-800 rounded-3xl p-6 hover:border-blue-500 transition-all">
                                <div class="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 class="text-3xl font-black">${s.symbol.split('.')[0]}</h3>
                                        <p class="text-[10px] text-blue-500 font-bold">${s.name}</p>
                                        <span class="text-sm font-bold ${s.change.includes('-') ? 'text-red-500' : 'text-emerald-500'}">${s.change}</span>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-3xl font-black">${s.price}</div>
                                        <div class="text-[9px] text-slate-600 font-bold">VOL: ${s.vol}</div>
                                    </div>
                                </div>
                                <div class="space-y-6">
                                    <div><p class="text-[9px] text-slate-500 font-bold mb-2 uppercase text-center border-b border-slate-800 pb-1">LEGO 5D Sequence</p>
                                    <div class="flex justify-center gap-1.5">${bricks}</div></div>
                                    <div class="flex justify-between bg-slate-900/50 p-3 rounded-2xl border border-white/5 text-sm">
                                        <span class="text-slate-500 font-bold uppercase text-[10px]">形態</span><span class="text-yellow-400 font-bold italic">${s.pattern}</span>
                                    </div>
                                    <div class="bg-blue-500/5 p-4 rounded-2xl border border-blue-500/10">
                                        <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Capital Flow (AA)</p>
                                        <p class="text-xl font-black text-emerald-400 tracking-tighter">${s.flow}</p>
                                    </div>
                                </div>
                            </div>`;
                    });
                    sectorHtml += `</div></section>`;
                    container.innerHTML += sectorHtml;
                }
            } catch (e) { console.error(e); }
        }

        setInterval(updateTime, 1000); updateTime();
        render(); setInterval(render, 60000);
    </script>
</body>
</html>
