<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>港股智勝 AI 指揮部 V6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #010409; color: #e6edf3; font-family: 'JetBrains Mono', sans-serif; }
        .lego-brick { width: 15px; height: 25px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.05); }
        .bg-red { background: linear-gradient(180deg, #ff6b6b, #f85149); box-shadow: 0 0 10px rgba(248, 81, 73, 0.4); }
        .bg-blue { background: linear-gradient(180deg, #4dabf7, #388bfd); box-shadow: 0 0 10px rgba(56, 139, 253, 0.4); }
        .bg-gray { background: #21262d; }
        .sector-title { border-left: 4px solid #388bfd; padding-left: 10px; margin-bottom: 20px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-end border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-blue-500 uppercase tracking-tighter">QUANTUM COMMAND V6.0</h1>
            <p class="text-slate-500 text-xs mt-1">四大鐵律執行：零幻覺、零預設、時空握手、最高算力</p>
        </div>
        <div class="text-right">
            <p id="clock-aest" class="text-emerald-400 font-bold text-lg"></p>
            <p id="clock-hkt" class="text-slate-600 text-[10px] font-bold"></p>
        </div>
    </header>

    <main id="app-container" class="max-w-7xl mx-auto space-y-12">
        </main>

    <script>
        function updateClocks() {
            const now = new Date();
            const fmt = (tz) => new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(now);
            document.getElementById('clock-aest').innerText = `BRISBANE (AEST): ${fmt('Australia/Brisbane')}`;
            document.getElementById('clock-hkt').innerText = `HONG KONG (HKT): ${fmt('Asia/Hong_Kong')}`;
        }

        async function loadData() {
            const res = await fetch('./data.json?t=' + Date.now());
            const root = await res.json();
            const container = document.getElementById('app-container');
            container.innerHTML = '';

            for (const [sectorName, stocks] of Object.entries(root.sectors)) {
                let sectorHtml = `
                    <section>
                        <h2 class="sector-title text-xl font-black text-slate-300 uppercase">${sectorName}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                `;

                stocks.forEach(s => {
                    const bricks = s.lego.map(color => `<div class="lego-brick bg-${color}"></div>`).join('');
                    const isUp = !s.change.includes('-');
                    
                    sectorHtml += `
                        <div class="bg-[#0d1117] border border-slate-800 rounded-2xl p-6 hover:border-blue-500 transition-all">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-2xl font-black">${s.symbol.split('.')[0]}</h3>
                                    <span class="text-xs font-bold ${isUp ? 'text-emerald-500' : 'text-red-500'}">${s.change}</span>
                                </div>
                                <div class="text-right">
                                    <div class="text-3xl font-black tracking-tighter">${s.price}</div>
                                    <div class="text-[9px] text-slate-600 uppercase font-bold">Vol: ${s.vol}</div>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <p class="text-[9px] text-slate-500 font-bold mb-2 uppercase tracking-widest text-center border-b border-slate-800 pb-1">LEGO 5D Sequence</p>
                                    <div class="flex justify-center gap-1">${bricks}</div>
                                </div>
                                <div class="flex justify-between bg-slate-900/50 p-3 rounded-lg border border-white/5">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase">形態</span>
                                    <span class="text-sm font-bold text-yellow-400 italic">${s.pattern}</span>
                                </div>
                                <div class="bg-blue-500/5 p-3 rounded-lg border border-blue-500/10">
                                    <p class="text-[9px] text-blue-400 font-black uppercase mb-1">Capital Flow (AA)</p>
                                    <p class="text-lg font-black text-emerald-400 tracking-tighter">${s.flow}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                sectorHtml += `</div></section>`;
                container.innerHTML += sectorHtml;
            }
        }

        setInterval(updateClocks, 1000); updateClocks();
        loadData(); setInterval(loadData, 60000);
    </script>
</body>
</html>
