<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港股 AI 算力矩陣 V4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', 'Microsoft JhengHei', monospace; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .lego-red { border-left: 5px solid #ef4444; }
        .lego-blue { border-left: 5px solid #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 border-b border-slate-800 pb-6 flex flex-col md:flex-row justify-between items-end">
        <div>
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">QUANTUM ALPHA V4.1</h1>
            <p class="text-slate-400 mt-2">AI 新貴 (100/2513/3317) 形態監控</p>
        </div>
        <div class="text-right mt-4 md:mt-0">
            <p class="text-sm font-bold text-blue-400" id="clock-aest">BRISBANE: --:--</p>
            <p class="text-[10px] text-slate-500" id="clock-hkt">HONG KONG: --:--</p>
        </div>
    </header>

    <main id="stock-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div id="status" class="col-span-full text-center py-20 text-slate-500">正在執行最高算力握手...</div>
    </main>

    <div id="debug" class="max-w-7xl mx-auto mt-10 p-4 bg-red-900/10 border border-red-500/20 rounded-xl text-[10px] text-red-400 hidden"></div>

    <script>
        function updateClocks() {
            const now = new Date();
            const format = (tz) => new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(now);
            document.getElementById('clock-aest').innerText = `BRISBANE: ${format('Australia/Brisbane')}`;
            document.getElementById('clock-hkt').innerText = `HONG KONG: ${format('Asia/Hong_Kong')}`;
        }

        async function loadData() {
            const container = document.getElementById('stock-grid');
            const debug = document.getElementById('debug');
            try {
                const res = await fetch('./data.json?t=' + Date.now());
                if (!res.ok) throw new Error("找不到 data.json，請檢查 GitHub Actions 是否運行成功。");
                const data = await res.json();
                
                if (Object.keys(data).length === 0) {
                    container.innerHTML = `<div class="col-span-full py-20 text-center text-orange-500">⚠ 數據緩存為空，請手動觸發 GitHub Actions。</div>`;
                    return;
                }

                container.innerHTML = '';
                for (const [s, info] of Object.entries(data)) {
                    const isStrong = info.lego.includes("紅磚");
                    container.innerHTML += `
                        <div class="glass-card rounded-2xl p-6 ${isStrong ? 'lego-red' : ''}">
                            <div class="flex justify-between mb-4">
                                <div><h2 class="text-2xl font-bold">${s.split('.')[0]}</h2><span class="text-[10px] text-emerald-400 font-bold">${info.name}</span></div>
                                <div class="text-right"><div class="text-3xl font-black">${info.price}</div><div class="text-[10px] text-slate-500">${info.volume}</div></div>
                            </div>
                            <div class="space-y-2">
                                <div class="flex justify-between bg-slate-900/50 p-3 rounded-lg"><span>LEGO</span><span class="font-bold ${isStrong ? 'text-red-500' : 'text-slate-400'}">${info.lego}</span></div>
                                <div class="flex justify-between bg-slate-900/50 p-3 rounded-lg"><span>形態</span><span class="text-yellow-400 italic">${info.pattern}</span></div>
                                <div class="flex flex-col bg-blue-500/5 p-3 rounded-lg"><span class="text-[9px] text-blue-400 uppercase">Capital Flow</span><span class="text-sm font-bold">${info.flow}</span></div>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                debug.innerText = `DEBUG: ${e.message}`;
                debug.classList.remove('hidden');
            }
        }
        setInterval(updateClocks, 1000); updateClocks();
        loadData();
    </script>
</body>
</html>
