<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>港股 AI 形態指揮部 V9.0 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #020617; color: #f1f5f9; font-family: 'JetBrains Mono', sans-serif; }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; transition: all 0.3s; }
        .lego-brick { width: 14px; height: 24px; border-radius: 3px; margin-right: 4px; }
        .bg-red { background-color: #ef4444; box-shadow: 0 0 12px #ef4444; }
        .bg-blue { background-color: #3b82f6; box-shadow: 0 0 12px #3b82f6; }
        .bg-gray { background-color: #334155; }
        .sector-divider { border-left: 4px solid #3b82f6; padding-left: 12px; margin: 40px 0 20px 0; background: linear-gradient(90deg, rgba(59, 130, 246, 0.1), transparent); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-end border-b border-slate-800 pb-8">
        <div>
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter uppercase">Quantum Command Matrix</h1>
            <p class="text-slate-500 text-[10px] mt-1 font-bold uppercase tracking-widest">張士佳 LEGO 視覺化 + 板塊分區 + 形態推斷</p>
        </div>
        <div class="text-right">
            <p id="clock-aest" class="text-emerald-400 font-bold text-xl"></p>
            <p id="clock-hkt" class="text-slate-600 text-[10px] font-bold uppercase"></p>
        </div>
    </header>

    <main id="main-container" class="max-w-7xl mx-auto">
        <div class="text-center py-20 text-slate-700 animate-pulse font-black text-xl uppercase">最高算力同步中...</div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            const fmt = (tz) => new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(now);
            document.getElementById('clock-aest').innerText = `AEST: ${fmt('Australia/Brisbane')}`;
            document.getElementById('clock-hkt').innerText = `HKT: ${fmt('Asia/Hong_Kong')}`;
        }

        async function loadMatrix() {
            try {
                const res = await fetch('./data.json?t=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('main-container');
                container.innerHTML = '';

                // 按板塊分組
                const sectors = data.reduce((acc, item) => {
                    if (!acc[item.sector]) acc[item.sector] = [];
                    acc[item.sector].push(item);
                    return acc;
                }, {});

                for (const [sectorName, stocks] of Object.entries(sectors)) {
                    let sectionHtml = `
                        <div class="sector-divider py-2"><h2 class="text-xl font-black text-slate-200 uppercase tracking-widest">${sectorName}</h2></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                    `;

                    stocks.forEach(s => {
                        const bricks = s.lego.map(color => `<div class="lego-brick bg-${color}"></div>`).join('');
                        const isUp = !s.change.includes('-');

                        sectionHtml += `
                            <div class="glass-card rounded-3xl p-6 hover:border-blue-500 hover:scale-[1.01]">
                                <div class="flex justify-between items-start mb-6">
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <h3 class="text-2xl font-black">${s.symbol.split('.')[0]}</h3>
                                            <span class="text-[9px] text-blue-400 font-bold uppercase">${s.name}</span>
                                        </div>
                                        <p class="text-sm font-bold ${isUp ? 'text-emerald-500' : 'text-red-500'}">${s.change}</p>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-3xl font-black">${s.price}</div>
                                        <div class="text-[9px] text-slate-600 font-bold uppercase tracking-tighter">Vol: ${s.vol}</div>
                                    </div>
                                </div>
                                <div class="space-y-5">
                                    <div>
                                        <p class="text-[9px] text-slate-500 font-bold mb-2 uppercase text-center border-b border-slate-800 pb-1">LEGO 5D Sequence</p>
                                        <div class="flex justify-center">${bricks}</div>
                                    </div>
                                    <div class="flex justify-between bg-slate-900/50 p-3 rounded-2xl border border-white/5 text-sm">
                                        <span class="text-[10px] text-slate-500 font-bold uppercase">形態推斷</span>
                                        <span class="text-yellow-400 font-bold italic tracking-tighter">${s.pattern}</span>
                                    </div>
                                    <div class="bg-blue-500/5 p-4 rounded-2xl border border-blue-500/10">
                                        <p class="text-[9px] text-blue-400 font-black uppercase mb-1">Capital Flow (AAStocks)</p>
                                        <p class="text-lg font-black text-emerald-400 tracking-tighter">${s.flow}</p>
                                    </div>
                                </div>
                                <div class="mt-6 pt-4 border-t border-slate-800/50 text-[9px] text-slate-700 flex justify-between font-bold">
                                    <span>MATRIX STATUS: ACTIVE</span>
                                    <span>UPDATED: ${s.update}</span>
                                </div>
                            </div>
                        `;
                    });
                    sectionHtml += `</div>`;
                    container.innerHTML += sectionHtml;
                }
            } catch (e) { console.error("Matrix Load Error:", e); }
        }

        setInterval(updateTime, 1000); updateTime();
        loadMatrix(); setInterval(loadMatrix, 60000);
    </script>
</body>
</html>
