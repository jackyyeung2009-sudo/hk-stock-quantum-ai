<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>港股智勝 AI 指揮部 V5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #010409; color: #e6edf3; font-family: sans-serif; }
        .lego-block { width: 12px; height: 20px; border-radius: 2px; margin-right: 3px; }
        .bg-red { background-color: #f85149; box-shadow: 0 0 8px #f85149; }
        .bg-blue { background-color: #388bfd; box-shadow: 0 0 8px #388bfd; }
        .bg-gray { background-color: #30363d; }
        .glass-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-end border-b border-slate-800 pb-8">
        <div>
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">COMMAND CENTER V5.0</h1>
            <p class="text-slate-500 mt-2">最高算力代勞：LEGO 視覺化 + 板塊資金流監控</p>
        </div>
        <div class="text-right">
            <p id="clock-aest" class="text-blue-500 font-bold text-xl"></p>
            <p id="clock-hkt" class="text-slate-600 text-xs font-bold"></p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto mb-10 grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="glass-panel p-4 text-center">
            <span class="text-[10px] text-slate-500 block uppercase">AI 板塊強度</span>
            <span id="ai-status" class="text-emerald-400 font-bold">同步中...</span>
        </div>
        </div>

    <main id="matrix" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </main>

    <script>
        function updateClocks() {
            const now = new Date();
            const fmt = (tz) => new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(now);
            document.getElementById('clock-aest').innerText = `AEST: ${fmt('Australia/Brisbane')}`;
            document.getElementById('clock-hkt').innerText = `HKT: ${fmt('Asia/Hong_Kong')}`;
        }

        async function loadMatrix() {
            const res = await fetch('./data.json?t=' + Date.now());
            const data = await res.json();
            const grid = document.getElementById('matrix');
            grid.innerHTML = '';

            for (const [s, info] of Object.entries(data)) {
                // 渲染 LEGO 歷史圖表
                let legoHtml = info.lego_history.map(color => `<div class="lego-block bg-${color}"></div>`).join('');
                
                grid.innerHTML += `
                    <div class="glass-panel p-6 hover:border-blue-500 transition-all">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h2 class="text-2xl font-black tracking-tighter">${s.split('.')[0]} <span class="text-xs text-blue-500">${info.name || ''}</span></h2>
                                <div class="flex mt-2">${legoHtml}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-3xl font-black">${info.price}</div>
                                <span class="text-[10px] ${info.sector_flow === '流入' ? 'text-emerald-500' : 'text-red-500'} font-bold">板塊${info.sector_flow}</span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between text-sm border-b border-slate-800 pb-2">
                                <span class="text-slate-500 font-bold uppercase text-[10px]">形態推斷</span>
                                <span class="text-yellow-400 font-bold italic">${info.pattern}</span>
                            </div>
                            <div class="bg-blue-500/5 p-4 rounded-lg">
                                <span class="text-[9px] text-blue-400 font-bold uppercase block mb-1">Capital Inflow (AAStocks)</span>
                                <span class="text-xl font-bold text-blue-300">${info.flow}</span>
                            </div>
                        </div>
                        <div class="mt-6 text-[9px] text-slate-700 flex justify-between uppercase">
                            <span>Matrix OK</span>
                            <span>${info.update}</span>
                        </div>
                    </div>
                `;
            }
        }
        setInterval(updateClocks, 1000); updateClocks();
        loadMatrix(); setInterval(loadMatrix, 60000);
    </script>
</body>
</html>
