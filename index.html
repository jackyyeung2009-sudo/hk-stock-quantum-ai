<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack's Alpha Matrix V12.0</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --up-color: #22c55e;
            --down-color: #ef4444;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; text-align: center;
        }
        h1 { color: var(--accent); letter-spacing: 2px; }
        .grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        
        /* 個股按鈕 */
        .stock-card {
            background: var(--panel-bg); padding: 20px; border-radius: 10px;
            cursor: pointer; transition: 0.3s; width: 150px;
            border: 1px solid #334155;
        }
        .stock-card:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transform: translateY(-3px); }
        .stock-symbol { font-size: 1.2rem; font-weight: bold; }
        
        /* 運算中提示 */
        #loading { display: none; margin-top: 20px; color: var(--accent); font-weight: bold; }

        /* 彈出視窗 (Modal) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--panel-bg); padding: 25px; border-radius: 12px;
            width: 90%; max-width: 800px; text-align: left; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-height: 90vh; overflow-y: auto;
        }
        .close-btn {
            position: absolute; right: 20px; top: 15px; color: var(--text-sub);
            font-size: 24px; cursor: pointer;
        }
        .close-btn:hover { color: white; }
        
        /* 報價與數據網格 */
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .data-box { background: #0f172a; padding: 15px; border-radius: 8px; text-align: center; }
        .data-value { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .up { color: var(--up-color); }
        .down { color: var(--down-color); }
        
        /* 圖表容器 */
        #chart-container { width: 100%; height: 300px; background: #0f172a; border-radius: 8px; margin-bottom: 20px; }
        
        /* 建議區塊 */
        .advice-panel { background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>COMMAND CENTER</h1>
    <h3>港股 AI 形態指揮部 V12.0 破局版</h3>
    <p>技術面 × 玄學面 × 實時最高算力</p>

    <div class="grid">
        <div class="stock-card" data-symbol="0700.HK" data-name="騰訊控股">
            <div class="stock-symbol">0700.HK</div>
            <div style="color: var(--text-sub); margin-top: 5px;">騰訊控股</div>
        </div>
        <div class="stock-card" data-symbol="9988.HK" data-name="阿里巴巴">
            <div class="stock-symbol">9988.HK</div>
            <div style="color: var(--text-sub); margin-top: 5px;">阿里巴巴</div>
        </div>
        <div class="stock-card" data-symbol="3690.HK" data-name="美團">
            <div class="stock-symbol">3690.HK</div>
            <div style="color: var(--text-sub); margin-top: 5px;">美團</div>
        </div>
    </div>

    <div id="loading">⚡ 最高算力同步中... (如超時5秒將自動啟動逃生門)</div>

    <div id="stockModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="margin-top: 0; color: var(--accent);">股票代號</h2>
            
            <div class="data-grid">
                <div class="data-box">
                    <div style="color: var(--text-sub); font-size: 0.9rem;">現價 (HKD)</div>
                    <div id="modal-price" class="data-value">--</div>
                </div>
                <div class="data-box">
                    <div style="color: var(--text-sub); font-size: 0.9rem;">市盈率 (PE)</div>
                    <div id="modal-pe" class="data-value" style="color: white;">--</div>
                </div>
                <div class="data-box">
                    <div style="color: var(--text-sub); font-size: 0.9rem;">52周高低</div>
                    <div id="modal-52w" class="data-value" style="color: white; font-size: 1.1rem; margin-top: 10px;">-- / --</div>
                </div>
            </div>

            <div id="chart-container"></div>

            <div class="advice-panel">
                <h4 style="margin-top:0; color: var(--accent);">☯️ 量子 AI 戰術判定</h4>
                <p id="modal-advice">分析中...</p>
            </div>
        </div>
    </div>

    <script>
        let chart = null;
        let lineSeries = null;

        // 模擬中轉 API 請求 (具備 5 秒超時防卡死機制)
        async function fetchStockData(symbol) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // 5秒極限

            try {
                // 註：此處暫用模擬數據。未來若你建好 Cloudflare Worker，將下方註解的 fetch 打開即可替換
                /*
                const response = await fetch(`https://your-worker.workers.dev/api/${symbol}`, { signal: controller.signal });
                const data = await response.json();
                */
               
                // --- 模擬網絡延遲與數據返回 (確保不會卡死) ---
                await new Promise(r => setTimeout(r, 1000));
                
                // 生成模擬報價與 K 線數據 (供展示用)
                const basePrice = symbol === '0700.HK' ? 489.2 : (symbol === '9988.HK' ? 70.5 : 98.4);
                return {
                    price: basePrice,
                    change: -1.5,
                    pe: 17.8,
                    high52: (basePrice * 1.3).toFixed(1),
                    low52: (basePrice * 0.7).toFixed(1),
                    advice: "卦象示《澤水困》。當前倉位13份現金對4份持貨，防守力極佳。跌勢雖見，但無需恐慌，龐大現金流正是破局關鍵。建議：【分注增持】，於支持位耐心收集籌碼。",
                    chartData: generateMockChartData(basePrice)
                };

            } catch (error) {
                if (error.name === 'AbortError') {
                    alert('請求超時 (Timeout)！已強制解除卡死狀態。請檢查 CORS 或網絡連線。');
                } else {
                    alert('系統遇到干擾：' + error.message);
                }
                return null;
            } finally {
                clearTimeout(timeoutId);
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 綁定點擊事件
        document.querySelectorAll('.stock-card').forEach(card => {
            card.addEventListener('click', async () => {
                const symbol = card.getAttribute('data-symbol');
                const name = card.getAttribute('data-name');
                
                document.getElementById('loading').style.display = 'block';
                const data = await fetchStockData(symbol);
                
                if (data) {
                    openModal(symbol, name, data);
                }
            });
        });

        function openModal(symbol, name, data) {
            document.getElementById('stockModal').style.display = 'flex';
            document.getElementById('modal-title').innerText = `${symbol} ${name}`;
            
            const priceEl = document.getElementById('modal-price');
            priceEl.innerText = data.price.toFixed(2);
            priceEl.className = `data-value ${data.change >= 0 ? 'up' : 'down'}`;
            
            document.getElementById('modal-pe').innerText = data.pe;
            document.getElementById('modal-52w').innerText = `${data.high52} / ${data.low52}`;
            document.getElementById('modal-advice').innerText = data.advice;

            renderChart(data.chartData);
        }

        function closeModal() {
            document.getElementById('stockModal').style.display = 'none';
            if (chart) {
                chart.remove();
                chart = null;
            }
        }

        // 渲染 TradingView 輕量圖表
        function renderChart(data) {
            const container = document.getElementById('chart-container');
            container.innerHTML = ''; // 清除舊圖表

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 300,
                layout: { background: { type: 'solid', color: '#0f172a' }, textColor: '#94a3b8' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                timeScale: { timeVisible: true, secondsVisible: false }
            });

            const candlestickSeries = chart.addCandlestickSeries({
                upColor: '#22c55e', downColor: '#ef4444',
                borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444'
            });

            candlestickSeries.setData(data);
            chart.timeScale().fitContent();
        }

        // 生成模擬 K 線數據工具
        function generateMockChartData(basePrice) {
            const data = [];
            let time = new Date('2026-01-01').getTime();
            let currentPrice = basePrice * 0.9;
            for (let i = 0; i < 60; i++) {
                const open = currentPrice;
                const close = open + (Math.random() - 0.5) * 5;
                const high = Math.max(open, close) + Math.random() * 2;
                const low = Math.min(open, close) - Math.random() * 2;
                data.push({ time: time / 1000, open, high, low, close });
                currentPrice = close;
                time += 86400000; // 加一天
            }
            return data;
        }
    </script>
</body>
</html>
