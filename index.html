<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>港股智勝分析矩陣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .card { background: #1e293b; border-left: 4px solid #3b82f6; }
        .strong { border-left-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">🚀 港股形態算力矩陣</h1>
        <p id="time-display" class="text-slate-500 mb-8 text-sm font-mono"></p>
        
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="col-span-3 text-center py-20 text-slate-600">正在調用 GitHub 數據...</p>
        </div>
    </div>

    <script>
        async function updateData() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                for (const [s, info] of Object.entries(data)) {
                    const isStrong = info.lego.includes("紅磚");
                    grid.innerHTML += `
                        <div class="card p-6 rounded-xl ${isStrong ? 'strong' : ''}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-2xl font-bold">${s.split('.')[0]}</span>
                                <span class="text-xl font-mono text-emerald-400">${info.price}</span>
                            </div>
                            <div class="space-y-2 text-sm">
                                <p class="flex justify-between"><span>LEGO:</span> <span class="font-bold ${isStrong ? 'text-red-400' : 'text-blue-400'}">${info.lego}</span></p>
                                <p class="flex justify-between"><span>形態:</span> <span class="text-yellow-400">${info.pattern}</span></p>
                                <p class="flex justify-between"><span>資金流:</span> <span class="text-emerald-300">${info.flow}</span></p>
                            </div>
                            <div class="mt-4 text-[10px] text-slate-500 text-right">更新於: ${info.update}</div>
                        </div>
                    `;
                }
                document.getElementById('time-display').innerText = `系統狀態：正常運行 | AEST: ${new Date().toLocaleString()}`;
            } catch(e) {
                console.error("加載失敗", e);
            }
        }
        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
