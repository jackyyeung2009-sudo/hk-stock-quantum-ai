<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>港股智勝 AI 戰區指揮部 V7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #010409; color: #e6edf3; font-family: 'JetBrains Mono', sans-serif; }
        .lego-brick { width: 14px; height: 24px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.05); }
        .bg-red { background: linear-gradient(180deg, #ff6b6b, #f85149); box-shadow: 0 0 10px rgba(248, 81, 73, 0.4); }
        .bg-blue { background: linear-gradient(180deg, #4dabf7, #388bfd); box-shadow: 0 0 10px rgba(56, 139, 253, 0.4); }
        .bg-gray { background: #21262d; }
        .sector-header { border-left: 4px solid #388bfd; padding-left: 12px; margin-bottom: 24px; background: linear-gradient(90deg, rgba(56, 139, 253, 0.1), transparent); py-2; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-end border-b border-slate-800 pb-8">
        <div>
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter">QUANTUM COMMAND V7.0</h1>
            <p class="text-slate-500 text-xs mt-2 font-bold uppercase tracking-widest">張士佳 LEGO 視覺化 + 板塊分區監控系統</p>
        </div>
        <div class="text-right">
            <p id="clock-aest" class="text-emerald-400 font-bold text-xl uppercase"></p>
            <p id="clock-hkt" class="text-slate-600 text-[10px] font-bold"></p>
        </div>
    </header>

    <main id="sector-container" class="max-w-7xl mx-auto space-y-16">
        <div class="text-center py-20 text-slate-700 animate-pulse font-black uppercase text-2xl">最高算力同步中...</div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            const fmt = (tz) => new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(now);
            document.getElementById('clock-aest').innerText = `BRISBANE (AEST): ${fmt('Australia/Brisbane')}`;
            document.getElementById('clock-hkt').innerText = `HONG KONG (HKT): ${fmt('Asia/Hong_Kong')}`;
        }

        async function render() {
            const res = await fetch('./data.json?t=' + Date.now());
            const root = await res.json();
            const container = document.getElementById('sector-container');
            container.innerHTML = '';

            for (const [sectorName, stocks] of Object.entries(root.sectors)) {
                let sectorHtml = `
                    <section>
                        <div class="sector-header"><h2 class="text-xl font-black text-slate-200 uppercase">${sectorName}</h2></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                `;

                stocks.forEach(s => {
                    const bricks = s.lego.map(color => `<div class="lego-brick bg-${color}"></div>`).join('');
                    const isUp = !s.change.includes('-');
                    
                    sectorHtml += `
                        <div class="bg-[#0d1117] border border-slate-800 rounded-3xl p-6 hover:border-blue-500 transition-all shadow-xl">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-3xl font-black tracking-tighter">${s.symbol.split('.')[0]}</h3>
                                    <p class="text-[10px] text-blue-500 font-bold uppercase">${s.name || '核心標的'}</p>
                                    <span class="text-sm font-bold ${isUp ? 'text-emerald-500' : 'text-red-500'}">${s.change}</span>
                                </div>
                                <div class="text-right">
                                    <div class="text-3xl font-black tracking-tighter">${s.price}</div>
                                    <div class="text-[9px] text-slate-600 font-bold uppercase tracking-tighter">Vol: ${s.vol}</div>
                                </div>
                            </div>
                            <div class="space-y-6">
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold mb-3 uppercase tracking-widest text-center border-b border-slate-800 pb-1">LEGO 5D Sequence</p>
                                    <div class="flex justify-center gap-1.5">${bricks}</div>
                                </div>
                                <div class="flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase">形態推斷</span>
                                    <span class="text-sm font-bold text-yellow-400 italic">${s.pattern}</span>
                                </div>
                                <div class="bg-blue-500/5 p-4 rounded-2xl border border-blue-500/10">
                                    <p class="text-[9px] text-blue-400 font-black uppercase mb-1">Capital Flow (AA)</p>
                                    <p class="text-xl font-black text-emerald-400 tracking-tighter">${s.flow}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                sectorHtml += `</div></section>`;
                container.innerHTML += sectorHtml;
            }
        }

        setInterval(updateTime, 1000); updateTime();
        render(); setInterval(render, 60000);
    </script>
</body>
</html>
